<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logan AI — Home Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(22, 27, 34, 0.8);
            --user-msg: #1f6feb;
            --logan-msg: #21262d;
            --accent-cyan: #00f2fe;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a233a 0%, #0b0e14 75%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            height: 92vh;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* HEADER */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(13, 17, 23, 0.5);
            position: relative;
        }

        .avatar-container {
            position: relative;
            width: 75px;
            height: 75px;
            margin: 0 auto 10px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .avatar.speaking {
            animation: pulse-cyan 1.5s infinite;
        }

        .avatar.listening {
            animation: pulse-red 1s infinite;
            background: linear-gradient(135deg, #ff4b1f, #ff9068);
        }

        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 242, 254, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); }
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 75, 31, 0.8); }
            70% { box-shadow: 0 0 0 20px rgba(255, 75, 31, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 75, 31, 0); }
        }

        h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }

        .dot.on { background-color: #2ea043; box-shadow: 0 0 8px #2ea043; }
        .dot.off { background-color: #da3633; }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.logan {
            align-self: flex-start;
            background: var(--logan-msg);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
        }

        /* CONTROLS */
        .controls {
            padding: 15px;
            background: rgba(13, 17, 23, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .mic-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn:active, .mic-btn.listening {
            background: linear-gradient(135deg, #da3633, #f85149);
            transform: scale(1.08);
            box-shadow: 0 4px 20px rgba(218, 54, 51, 0.6);
        }

        .input-group {
            width: 100%;
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-cyan);
        }

        .send-btn {
            background: #1f6feb;
            border: none;
            border-radius: 12px;
            padding: 0 18px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="avatar-container">
                <div id="avatar" class="avatar">🐺</div>
            </div>
            <h1>Logan AI</h1>
            <div class="status-badge">
                <span>Luz Habitación:</span>
                <span id="light-dot" class="dot"></span>
            </div>
        </div>

        <!-- CHAT HISTORIAL -->
        <div id="chat-container" class="chat-container">
            <div class="message logan">
                👋 ¡Hola! Soy Logan. ¿En qué te puedo ayudar hoy?
            </div>
        </div>

        <!-- CONTROLES -->
        <div class="controls">
            <button id="mic-btn" class="mic-btn" onclick="toggleVoice()">
                <i class="fa-solid fa-microphone"></i>
            </button>

            <div class="input-group">
                <input type="text" id="text-input" placeholder="Escribe un mensaje a Logan..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="enviarTexto()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const lightDot = document.getElementById('light-dot');
        const micBtn = document.getElementById('mic-btn');
        const avatar = document.getElementById('avatar');

        // Reconocimiento de Voz
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';

            recognition.onstart = () => {
                micBtn.classList.add('listening');
                avatar.classList.add('listening');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                agregarMensaje(transcript, 'user');
                procesarComando(transcript);
            };

            recognition.onend = () => {
                micBtn.classList.remove('listening');
                avatar.classList.remove('listening');
            };
        }

        function toggleVoice() {
            if (recognition) {
                try { recognition.start(); } catch(e) { recognition.stop(); }
            } else {
                alert("Tu navegador no soporta reconocimiento de voz directo.");
            }
        }

        function handleKey(e) {
            if (e.key === 'Enter') enviarTexto();
        }

        function enviarTexto() {
            const input = document.getElementById('text-input');
            const texto = input.value.trim();
            if (texto !== "") {
                agregarMensaje(texto, 'user');
                procesarComando(texto);
                input.value = "";
            }
        }

        function agregarMensaje(texto, remitente) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', remitente);
            msgDiv.innerText = texto;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Sintetizador de Voz (Hablar)
        function hablar(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-ES';
                utterance.rate = 1.0;

                utterance.onstart = () => avatar.classList.add('speaking');
                utterance.onend = () => avatar.classList.remove('speaking');

                window.speechSynthesis.speak(utterance);
            }
        }

        async function procesarComando(texto) {
            try {
                const response = await fetch('https://logan-server-ba38.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: texto })
                });

                const data = await response.json();
                
                // Mostrar respuesta en el chat
                agregarMensaje(data.reply, 'logan');

                // Hablar
                hablar(data.reply);

                // Actualizar indicador de luz
                if (data.estado_rele === "ON") {
                    lightDot.className = "dot on";
                } else if (data.estado_rele === "OFF") {
                    lightDot.className = "dot off";
                }
            } catch (err) {
                agregarMensaje("Error al conectar con Logan en la nube.", 'logan');
            }
        }
    </script>
</body>
</html>
